global:
  css:
    theme:
      dist/styles.base.css: {}
      dist/styles.theme.css: {}
      dist/styles.variables.css: {}
  js:
    dist/scripts.drupal.base.js: {}
  dependencies:
    - core/drupal
    - core/once
    - core/drupalSettings

css-variables:
  css:
    theme:
      dist/styles.variables.css: { preprocess: false, weight: 10 }

# Scroll-reveal animation. Authored JS (not part of the SCSS/dist build),
# attached globally via the theme info file. The reveal styles ship in the
# compiled theme CSS (assets/sass/brand/_animations.scss).
reveal:
  js:
    assets/js/reveal.js: {}
  dependencies:
    - core/drupal
    - core/once
