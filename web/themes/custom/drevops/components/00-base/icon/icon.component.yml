$schema: https://git.drupalcode.org/project/drupal/-/raw/HEAD/core/assets/schemas/v1/metadata.schema.json
name: Icon
status: stable
description: Icon override — resolves from active sub-theme assets with fallback to civictheme.
replaces: 'civictheme:icon'
props:
  type: object
  properties:
    symbol:
      type: [string, 'null']
      title: Symbol
    size:
      type: [string, 'null']
      title: Size
    attributes:
      type: Drupal\Core\Template\Attribute
      title: Attributes
    modifier_class:
      type: string
      title: Modifier classes
    assets_dir:
      type: [string, 'null']
      title: Assets directory
