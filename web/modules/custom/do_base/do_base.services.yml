services:
  do_base.twig.icon_assets:
    class: Drupal\do_base\Twig\IconAssetsExtension
    arguments: ['@theme.manager']
    tags:
      - { name: twig.extension }
  do_base.twig.navigation:
    class: Drupal\do_base\Twig\NavigationExtension
    arguments: ['@menu.link_tree']
    tags:
      - { name: twig.extension }
