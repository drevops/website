favicon:
  mimetype: image/vnd.microsoft.icon
  path: themes/custom/drevops/dist/assets/favicon.ico
  use_default: 0
features:
  favicon: 1
components:
  logo:
    primary:
      light:
        desktop:
          path: themes/custom/drevops/dist/assets/logos/logo_primary_light_desktop.svg
        mobile:
          path: themes/custom/drevops/dist/assets/logos/logo_primary_light_mobile.svg
      dark:
        desktop:
          path: themes/custom/drevops/dist/assets/logos/logo_primary_dark_desktop.svg
        mobile:
          path: themes/custom/drevops/dist/assets/logos/logo_primary_dark_mobile.svg
    secondary:
      light:
        desktop:
          path: themes/custom/drevops/dist/assets/logos/logo_primary_light_desktop.svg
        mobile:
          path: themes/custom/drevops/dist/assets/logos/logo_primary_light_mobile.svg
      dark:
        desktop:
          path: themes/custom/drevops/dist/assets/logos/logo_primary_dark_desktop.svg
        mobile:
          path: themes/custom/drevops/dist/assets/logos/logo_primary_dark_mobile.svg
    image_alt: 'Logo image'
  site_slogan:
    content: 'A design system by Salsa Digital'
  header:
    theme: dark
    logo_type: default
    is_sticky: 1
  footer:
    theme: dark
    logo_type: default
    background_image:
      path: ''
  navigation:
    primary_navigation:
      dropdown: dropdown
      dropdown_columns: '4'
      dropdown_columns_fill: 0
      is_animated: 1
    secondary_navigation:
      dropdown: dropdown
      dropdown_columns: '4'
      dropdown_columns_fill: 0
      is_animated: 1
  link:
    new_window: 0
    external_new_window: 1
    external_override_domains: {  }
  skip_link:
    theme: light
  event_card:
    summary_length: '160'
  navigation_card:
    summary_length: '1000'
  promo_card:
    summary_length: '3000'
  publication_card:
    summary_length: '160'
    use_media_name: 1
  snippet:
    summary_length: '160'
  attachment:
    use_media_name: 1
colors:
  use_color_selector: 1
  use_brand_colors: 1
  brand:
    light:
      brand1: '#96e7f4'
      brand2: '#152235'
      brand3: '#ff9c86'
    dark:
      brand1: '#96e7f4'
      brand2: '#152235'
      brand3: '#ff9c86'
  palette:
    light:
      background: '#152235'
      border: '#1f3a47'
      highlight: '#ff9c86'
      heading: '#ffffff'
      body: '#eff6ff'
      background_light: '#2b394d'
      background_dark: '#030d1e'
      border_light: '#2b4f5d'
      border_dark: '#0c1a24'
      interaction_text: '#152235'
      interaction_background: '#96e7f4'
      interaction_hover_text: '#152235'
      interaction_hover_background: '#e1fbff'
      interaction_focus: '#96e7f4'
      information: '#55a7b4'
      warning: '#ffc20a'
      error: '#db2e3f'
      success: '#3ad05c'
    dark:
      background: '#152235'
      border: '#1f3a47'
      highlight: '#ff9c86'
      heading: '#ffffff'
      body: '#eff6ff'
      background_light: '#2b394d'
      background_dark: '#030d1e'
      border_light: '#2b4f5d'
      border_dark: '#0c1a24'
      interaction_text: '#152235'
      interaction_background: '#96e7f4'
      interaction_hover_text: '#152235'
      interaction_hover_background: '#e1fbff'
      interaction_focus: '#96e7f4'
      information: '#55a7b4'
      warning: '#ffc20a'
      error: '#db2e3f'
      success: '#3ad05c'
optouts: {  }
